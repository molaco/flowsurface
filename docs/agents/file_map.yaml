## Key Integration Patterns

### GUI Component Integration
Primary Pattern: src/widget/ → src/screen/ → src/modal/
- Custom widgets implement Iced Element trait
- Screen components compose widgets into layouts  
- Modal system provides dialog management
- Theme system applies consistent styling

### Chart System Integration
Primary Pattern: exchange/ → data/chart/ → src/chart/
- Exchange adapters provide raw market data
- Data layer processes and aggregates information
- Chart components render processed data
- Real-time updates flow through message system

### Configuration Integration  
Primary Pattern: data/config/ → saved-state.json → Application State
- Configuration modules define data structures
- JSON persistence provides cross-session state
- Application loads state on startup
- Changes propagate through message system

### Exchange Integration
Primary Pattern: exchange/adapter/ → exchange/connect.rs → data/
- Adapters implement exchange-specific logic
- Connection manager handles WebSocket lifecycle
- Data flows to processing and chart systems
- Error handling provides graceful degradation

This comprehensive file map enables autonomous agents to understand the complete codebase structure, identify the correct files to modify for specific tasks, and understand integration points and validation requirements.