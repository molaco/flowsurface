# File-to-Purpose Mapping for Agent Operations
# This file provides comprehensive mapping of all major files and their purposes for autonomous agent operations

## Main Application Layer (src/)

### Core Application Files
src/main.rs:
  purpose: "Application entry point with Iced daemon setup"
  responsibilities:
    - Logger initialization
    - Font loading (AzeretMono, Icons)
    - Iced daemon configuration
    - Window management setup
    - Market data cleanup thread spawning
  modify_for:
    - Application-wide settings changes
    - Font additions or modifications
    - Daemon behavior changes
    - Global initialization logic
  integration_points:
    - window.rs (window management)
    - logger.rs (logging system)
    - style.rs (fonts and theming)
  validation_tests:
    - Application launches successfully
    - All fonts load correctly
    - Logger initializes without errors

src/window.rs:
  purpose: "Multi-window management and popout support"
  responsibilities:
    - Window creation and destruction
    - Multi-monitor support
    - Popout panel management
    - Window state persistence
  modify_for:
    - New window types or layouts
    - Multi-monitor features
    - Window decoration changes
    - Popout behavior modifications
  integration_points:
    - main.rs (daemon integration)
    - screen/dashboard.rs (main content)
    - layout.rs (layout persistence)
  validation_tests:
    - Windows create and close properly
    - Popout functionality works
    - Multi-monitor support functions
    - Window state persists correctly

