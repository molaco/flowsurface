# Quick Reference for Agents
# Essential commands, patterns, and information for rapid development

## Essential Commands

build_and_test:
  description: "Core development workflow commands"
  commands:
    build_debug: "cargo build"
    build_release: "cargo build --release"
    run_debug: "cargo run"
    run_release: "cargo run --release"
    run_with_debug: "cargo run --features debug"
    test: "cargo test"
    format: "cargo fmt"
    lint: "cargo clippy"
    check: "cargo check"
  validation_sequence:
    1: "cargo check (quick compile validation)"
    2: "cargo clippy (linting)"
    3: "cargo fmt --check (formatting)"
    4: "cargo test (run tests)"
    5: "cargo build --release (final build)"

development_shortcuts:
  description: "Useful development shortcuts and flags"
  hot_reloading: "cargo run --features debug"
  verbose_logging: "RUST_LOG=debug cargo run"
  clean_build: "cargo clean && cargo build"
  specific_test: "cargo test test_name"
  documentation: "cargo doc --open"
  workspace_check: "cargo check --workspace"

## File System Layout

critical_paths:
  main_app: "src/main.rs"
  gui_core: "src/screen/dashboard.rs"
  chart_system: "src/chart/"
  data_layer: "data/src/"
  exchange_layer: "exchange/src/"
  configuration: "data/config/"
  widgets: "src/widget/"
  modals: "src/modal/"
  themes: "src/style.rs"
  layouts: "src/layout.rs"

config_files:
  main_workspace: "Cargo.toml"
  data_workspace: "data/Cargo.toml"
  exchange_workspace: "exchange/Cargo.toml"
  formatting: "rustfmt.toml"
  linting: "clippy.toml"
  saved_state: "saved-state.json"

## Common Integration Points

gui_integration:
  widget_creation: "src/widget/[name].rs → src/widget.rs → integration point"
  modal_creation: "src/modal/[name].rs → src/modal.rs → message enum update"
  screen_update: "src/screen/ → message handling → view updates"
  theme_integration: "src/style.rs → component styling → theme system"

chart_integration:
  new_chart_type: "data/chart/[name].rs → src/chart/[name].rs → pane integration"
  indicator_addition: "data/chart/indicator.rs → src/chart/indicator/ → settings UI"
  data_flow: "exchange/ → data/aggr/ → data/chart/ → src/chart/"
  real_time_updates: "WebSocket → aggregation → chart update → GUI refresh"

exchange_integration:
  adapter_creation: "exchange/adapter/[name].rs → trait implementation → connection management"
  websocket_setup: "exchange/connect.rs → auto-reconnection → error handling"
  rate_limiting: "exchange/limiter.rs → exchange-specific limits → request throttling"
  data_processing: "exchange/ → data/ → chart rendering"

## Message Flow Patterns

main_message_types:
  exchange_events:
    - "TradeReceived(Exchange, Trade)"
    - "DepthUpdated(Exchange, Depth)"
    - "ConnectionStatusChanged(Exchange, Status)"
  gui_events:
    - "TickerSelected(Ticker)"
    - "ThemeChanged(Theme)"
    - "LayoutModified(Layout)"
  chart_events:
    - "ChartScaled(Scale)"
    - "IndicatorToggled(Indicator)"
    - "TimeframeChanged(Timeframe)"

update_pattern:
  description: "Standard Iced update pattern"
  signature: "fn update(&mut self, message: Message) -> Command<Message>"
  typical_flow:
    1: "Match on message type"
    2: "Update internal state"
    3: "Perform side effects if needed"
    4: "Return Command for async operations"
    5: "GUI automatically refreshes via view()"

## Data Structures Quick Reference

core_market_data:
  Trade:
    fields: "price, qty, time, is_buyer_maker"
    usage: "Real-time trade processing, footprint charts"
  Kline:
    fields: "open_time, close_time, open, high, low, close, volume"
    usage: "Candlestick charts, technical indicators"
