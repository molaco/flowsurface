    fields: "symbol, exchange, base, quote"
    usage: "Market identification, data routing"
  Theme:
    fields: "palette, background, text, colors"
    usage: "UI customization, runtime theming"
  Settings:
    fields: "theme, sidebar, layout, exchanges"
    usage: "Application configuration, persistence"

